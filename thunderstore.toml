[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "SparrohUILib"
description = "Shared UI library for Sparroh Mycopunk mods. Provides themed widgets, HUD builders, windows, and resolution-aware layout."
websiteUrl = "https://github.com/Little-Sparroh/SparrohUILib"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/netstandard2.1/SparrohUILib.dll"
target = "BepInEx/plugins/SparrohUILib.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "libraries", "client" ]
